<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveAds Perks — Admin</title>
<link rel="stylesheet" href="styles.css">
<style>
  .month-nav { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .month-nav h2 { margin:0; font-size:1.2rem; flex:1; }
  .month-grid { display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:24px; }
  .week-block { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .week-block-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:0.5px solid var(--border); cursor:pointer; }
  .week-block-header:hover { background:var(--surface-2); }
  .week-block-body { padding:14px 16px; display:none; }
  .week-block-body.open { display:block; }
  .week-label { font-weight:700; font-size:0.9rem; }
  .week-dates { font-size:0.78rem; color:var(--text-soft); margin-top:2px; }
  .week-summary { display:flex; gap:8px; flex-wrap:wrap; }
  .assign-table { width:100%; border-collapse:collapse; }
  .assign-table th { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-soft); padding:6px 8px; text-align:left; border-bottom:0.5px solid var(--border); }
  .assign-table td { padding:8px; border-bottom:0.5px solid var(--border); font-size:0.88rem; vertical-align:middle; }
  .assign-table tr:last-child td { border-bottom:none; }
  .assign-table select { width:100%; padding:6px 8px; font-size:0.82rem; }
  .assign-table input[type="date"] { width:100%; padding:6px 8px; font-size:0.82rem; }
  .perk-input { width:100%; padding:6px 8px; font-size:0.82rem; background:var(--surface-2); border:0.5px solid var(--border-light); border-radius:var(--radius-sm); color:var(--text); }
  .perk-input:focus { outline:none; border-color:var(--teal); }
  .current-week-marker { background:rgba(91,196,181,0.06); }
  .current-week-marker .week-block-header { border-left:3px solid var(--teal); }
  .week-actions { display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }
  .history-badge { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:3px 8px; border-radius:999px; background:var(--surface-2); color:var(--text-dim); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
  .expiry-row { display:flex; align-items:center; gap:8px; }
</style>
</head>
<body>

<div class="app-shell">
  <div class="topbar">
    <div class="brand">
      <div class="logo" id="logoSlot"></div>
      <span class="brand-text">WaveAds Perks</span>
    </div>
    <div class="who">Admin</div>
  </div>

  <div class="page-header">
    <div class="card-row">
      <div>
        <h1>Perks Manager</h1>
        <p class="subtitle">Plan monthly, assign weekly, track redemptions</p>
      </div>
    </div>
  </div>

  <div class="grid" id="statsGrid"></div>

  <div class="view-tabs">
    <button class="active" data-tab="weekly">Weekly</button>
    <button data-tab="manage">Businesses &amp; Drivers</button>
    <button data-tab="links">Share links</button>
    <button data-tab="redeems">Customer Redeems</button>
  </div>

  <div id="content-weekly" class="tab-content active">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
  <div id="content-manage" class="tab-content"></div>
  <div id="content-links" class="tab-content"></div>
  <div id="content-redeems" class="tab-content"></div>
</div>

<script src="config.js"></script>
<script>
document.getElementById('logoSlot').innerHTML = LOGO_SVG;

let state = { businesses: [], drivers: [], assignments: [], redemptions: [] };
let activeTab = 'weekly';

// ── Week / month helpers ──────────────────────────────────────────────
function getWeekKey(date) {
  const d = new Date(date);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const diff = (d - jan1) / 86400000;
  const week = Math.ceil((diff + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
}

function getCurrentWeek() { return getWeekKey(new Date()); }

// Get Mon–Sun for a given week key
function weekBounds(weekKey) {
  const m = weekKey.match(/(\d+)-W(\d+)/);
  const year = parseInt(m[1]), week = parseInt(m[2]);
  const jan1 = new Date(year, 0, 1);
  const dayOfWeek = jan1.getDay(); // 0=Sun
  const monday = new Date(jan1);
  monday.setDate(jan1.getDate() + (week - 1) * 7 - dayOfWeek + 1);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  return { monday, sunday };
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// Get all week keys for a given month (YYYY-MM)
function weeksInMonth(yearMonth) {
  const [year, month] = yearMonth.split('-').map(Number);
  const weeks = [];
  const seen = new Set();
  const days = new Date(year, month, 0).getDate();
  for (let d = 1; d <= days; d++) {
    const key = getWeekKey(new Date(year, month - 1, d));
    if (!seen.has(key)) { seen.add(key); weeks.push(key); }
  }
  return weeks;
}

function monthLabel(yearMonth) {
  const [year, month] = yearMonth.split('-').map(Number);
  return new Date(year, month - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function prevMonth(ym) {
  let [y, m] = ym.split('-').map(Number);
  m--; if (m < 1) { m = 12; y--; }
  return `${y}-${String(m).padStart(2, '0')}`;
}
function nextMonth(ym) {
  let [y, m] = ym.split('-').map(Number);
  m++; if (m > 12) { m = 1; y++; }
  return `${y}-${String(m).padStart(2, '0')}`;
}

function todayYearMonth() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, '0')}`;
}

let currentMonth = todayYearMonth();
const CURRENT_WEEK = getCurrentWeek();
let statsWeek = CURRENT_WEEK;

// ── LocalStorage helpers ──────────────────────────────────────────────
function lsKey(weekKey) { return 'waveads_expiry_' + weekKey; }
function getExpiry(weekKey) { return localStorage.getItem(lsKey(weekKey)) || ''; }
function setExpiry(weekKey, val) { localStorage.setItem(lsKey(weekKey), val); }

// Per-business per-week perk override (local, for planning)
function perkOverrideKey(weekKey, bizId) { return `waveads_perk_${weekKey}_${bizId}`; }
function getPerkOverride(weekKey, bizId) { return localStorage.getItem(perkOverrideKey(weekKey, bizId)); }
function setPerkOverride(weekKey, bizId, val) { localStorage.setItem(perkOverrideKey(weekKey, bizId), val); }

// ── Load ──────────────────────────────────────────────────────────────
async function load() {
  const res = await apiCall('getState');
  if (res.ok) {
    state.businesses = res.businesses || [];
    state.drivers    = res.drivers    || [];
    state.assignments = res.assignments || [];
  } else {
    document.getElementById('content-weekly').innerHTML = `
      <div class="empty-state"><h3>Not connected</h3>
      <p>Paste your Apps Script URL into config.js to connect the backend.</p></div>`;
    return;
  }
  const redRes = await apiCall('getCustomerRedemptions', {});
  if (redRes.ok) state.redemptions = redRes.redemptions || [];
  renderAll();
}

function weekAssignments(weekKey) {
  return state.assignments.filter(a => a.week === weekKey);
}
function businessById(id) { return state.businesses.find(b => b.id === id); }
function driverById(id)   { return state.drivers.find(d => d.id === id); }

// ── Render all tabs ───────────────────────────────────────────────────
function renderAll() {
  renderStats();
  document.querySelectorAll('.view-tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === activeTab));

  if (activeTab === 'weekly') renderWeekly();
  else if (activeTab === 'manage') renderManage();
  else if (activeTab === 'links') renderLinks();
  else renderRedeems();
}

function renderStats() {
  const wa = weekAssignments(statsWeek);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Businesses</div><div class="stat-value">${state.businesses.length}</div></div>
    <div class="stat-card"><div class="stat-label">Drivers</div><div class="stat-value">${state.drivers.length}</div></div>
    <div class="stat-card">
      <div class="stat-label">Available</div>
      <div class="stat-value teal">${wa.filter(a=>a.status==='available').length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Redeemed</div>
      <div class="stat-value amber">${wa.filter(a=>a.status==='redeemed').length}</div>
    </div>
  `;

  // Week selector, placed above the stats grid
  let selector = document.getElementById('statsWeekSelector');
  if (!selector) {
    selector = document.createElement('div');
    selector.id = 'statsWeekSelector';
    selector.style.cssText = 'display:flex; align-items:center; gap:8px; margin-bottom:10px;';
    document.getElementById('statsGrid').insertAdjacentElement('beforebegin', selector);
  }
  const allWeeks = Array.from(new Set(state.assignments.map(a => a.week)));
  if (!allWeeks.includes(CURRENT_WEEK)) allWeeks.push(CURRENT_WEEK);
  allWeeks.sort().reverse();

  selector.innerHTML = `
    <span class="hint" style="margin:0;">Stats for week:</span>
    <select id="statsWeekSelect" style="width:auto; padding:6px 10px; font-size:0.82rem;">
      ${allWeeks.map(w => `<option value="${w}" ${w === statsWeek ? 'selected' : ''}>${w === CURRENT_WEEK ? w + ' (this week)' : w}</option>`).join('')}
    </select>`;

  document.getElementById('statsWeekSelect').addEventListener('change', (e) => {
    statsWeek = e.target.value;
    renderStats();
  });
}

// ── Weekly tab ────────────────────────────────────────────────────────
function renderWeekly() {
  const weeks = weeksInMonth(currentMonth);
  let html = `
    <div class="month-nav">
      <button class="btn btn-sm btn-ghost" id="prevMonthBtn">‹ Prev</button>
      <h2>${monthLabel(currentMonth)}</h2>
      <button class="btn btn-sm btn-ghost" id="nextMonthBtn">Next ›</button>
    </div>`;

  weeks.forEach(wk => {
    const { monday, sunday } = weekBounds(wk);
    const isCurrent = wk === CURRENT_WEEK;
    const isPast = wk < CURRENT_WEEK;
    const wa = weekAssignments(wk);
    const redeemed = wa.filter(a => a.status === 'redeemed').length;
    const available = wa.filter(a => a.status === 'available').length;
    const expiry = getExpiry(wk);

    html += `<div class="week-block${isCurrent ? ' current-week-marker' : ''}">
      <div class="week-block-header" data-toggle="${wk}">
        <div>
          <div class="week-label">${isCurrent ? '★ ' : ''}${wk} <span style="font-weight:400; color:var(--text-soft); font-size:0.82rem;">${fmtDate(monday)} – ${fmtDate(sunday)}</span></div>
          <div class="week-summary" style="margin-top:4px;">
            ${wa.length === 0 ? `<span class="history-badge">No assignments</span>` : ''}
            ${available > 0 ? `<span class="pill pill-available" style="font-size:0.65rem; padding:2px 8px;">${available} available</span>` : ''}
            ${redeemed > 0 ? `<span class="pill pill-redeemed" style="font-size:0.65rem; padding:2px 8px;">${redeemed} redeemed</span>` : ''}
            ${expiry ? `<span class="history-badge">Valid thru ${formatDate(expiry)}</span>` : ''}
          </div>
        </div>
        <span style="color:var(--text-dim); font-size:0.9rem;" id="chevron-${wk}">${isCurrent ? '▾' : '▸'}</span>
      </div>
      <div class="week-block-body${isCurrent ? ' open' : ''}" id="body-${wk}">
        ${renderWeekBody(wk, wa, isPast)}
      </div>
    </div>`;
  });

  document.getElementById('content-weekly').innerHTML = html;

  // Toggle open/close
  document.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const wk = el.dataset.toggle;
      const body = document.getElementById('body-' + wk);
      const ch   = document.getElementById('chevron-' + wk);
      const open = body.classList.toggle('open');
      ch.textContent = open ? '▾' : '▸';
    });
  });

  document.getElementById('prevMonthBtn').addEventListener('click', () => { currentMonth = prevMonth(currentMonth); renderWeekly(); });
  document.getElementById('nextMonthBtn').addEventListener('click', () => { currentMonth = nextMonth(currentMonth); renderWeekly(); });

  attachWeekHandlers();
}

function renderWeekBody(wk, wa, isPast) {
  const expiry = getExpiry(wk);
  let html = `
    <div class="expiry-row" style="margin-bottom:14px;">
      <span style="font-size:0.8rem; color:var(--text-soft); min-width:90px;">Valid through:</span>
      <input type="date" id="expiry-${wk}" value="${expiry}" style="width:160px; padding:5px 8px; font-size:0.82rem;">
      <button class="btn btn-sm" data-save-expiry="${wk}">Save</button>
      <span class="hint" id="expiry-msg-${wk}" style="margin:0;"></span>
    </div>`;

  html += `<table class="assign-table">
    <thead><tr>
      <th>Business</th>
      <th>Perk this week</th>
      <th>Driver</th>
      <th>Status</th>
      <th></th>
    </tr></thead><tbody>`;

  state.businesses.forEach(b => {
    const a = wa.find(x => x.businessId === b.id);
    const perkOverride = getPerkOverride(wk, b.id) ?? b.perk;
    const drv = a ? driverById(a.driverId) : null;

    if (a) {
      // Already assigned
      const isRedeemed = a.status === 'redeemed';
      html += `<tr>
        <td><strong>${escapeHtml(b.name)}</strong><br><span class="code-badge" style="font-size:0.7rem;">${escapeHtml(b.code)}</span></td>
        <td style="color:var(--text-soft); font-size:0.82rem;">${escapeHtml(perkOverride)}</td>
        <td>${escapeHtml(drv ? drv.name : '?')}</td>
        <td><span class="pill ${isRedeemed ? 'pill-redeemed' : 'pill-available'}" style="font-size:0.65rem;">${isRedeemed ? 'Redeemed' : 'Available'}</span></td>
        <td style="white-space:nowrap;">
          ${isRedeemed
            ? `<button class="btn btn-sm btn-ghost" data-unredeem="${a.id}">Undo</button>`
            : `<button class="btn btn-sm btn-primary" data-redeem="${a.id}">✓ Redeem</button>`}
          <button class="btn btn-sm btn-icon btn-ghost btn-danger" data-remove-assignment="${a.id}" style="margin-left:4px;">✕</button>
        </td>
      </tr>`;
    } else {
      // Not assigned — show perk input + driver dropdown
      html += `<tr>
        <td><strong>${escapeHtml(b.name)}</strong><br><span class="code-badge" style="font-size:0.7rem;">${escapeHtml(b.code)}</span></td>
        <td><input class="perk-input" data-perk-override="${wk}|${b.id}" value="${escapeHtml(perkOverride)}" placeholder="Perk for this week"></td>
        <td colspan="2">
          <select data-assign="${b.id}" data-week="${wk}">
            <option value="">Assign driver...</option>
            ${state.drivers.map(d => `<option value="${d.id}">${escapeHtml(d.name)}</option>`).join('')}
          </select>
        </td>
        <td></td>
      </tr>`;
    }
  });

  html += `</tbody></table>`;
  return html;
}

function attachWeekHandlers() {
  // Save expiry
  document.querySelectorAll('[data-save-expiry]').forEach(btn => {
    btn.addEventListener('click', () => {
      const wk = btn.dataset.saveExpiry;
      const val = document.getElementById('expiry-' + wk).value;
      setExpiry(wk, val);
      const msg = document.getElementById('expiry-msg-' + wk);
      msg.textContent = 'Saved.'; msg.className = 'hint success';
      setTimeout(() => { msg.textContent = ''; renderWeekly(); }, 1000);
    });
  });

  // Save perk override locally as you type
  document.querySelectorAll('[data-perk-override]').forEach(input => {
    input.addEventListener('change', () => {
      const [wk, bizId] = input.dataset.perkOverride.split('|');
      setPerkOverride(wk, bizId, input.value);
    });
  });

  // Assign perk
  document.querySelectorAll('[data-assign]').forEach(sel => {
    sel.addEventListener('change', async (e) => {
      const driverId   = e.target.value;
      if (!driverId) return;
      const businessId = e.target.dataset.assign;
      const wk         = e.target.dataset.week;
      // Use any local perk override
      const perkInput = document.querySelector(`[data-perk-override="${wk}|${businessId}"]`);
      if (perkInput) setPerkOverride(wk, businessId, perkInput.value);
      e.target.disabled = true;
      const res = await apiCall('assignPerk', { week: wk, businessId, driverId });
      if (res.ok) {
        state.assignments.push({ id: res.id, week: wk, businessId, driverId, status: 'available', createdAt: new Date().toISOString(), redeemedAt: '' });
        renderAll();
      } else {
        alert(res.error || 'Could not assign.'); e.target.disabled = false;
      }
    });
  });

  // Redeem
  document.querySelectorAll('[data-redeem]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.redeem; btn.disabled = true;
      const res = await apiCall('redeem', { id });
      if (res.ok) {
        const a = state.assignments.find(x => x.id === id);
        if (a) { a.status = 'redeemed'; a.redeemedAt = new Date().toISOString(); }
        renderAll();
      } else btn.disabled = false;
    });
  });

  // Unredeem
  document.querySelectorAll('[data-unredeem]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.unredeem; btn.disabled = true;
      const res = await apiCall('unredeem', { id });
      if (res.ok) {
        const a = state.assignments.find(x => x.id === id);
        if (a) { a.status = 'available'; a.redeemedAt = ''; }
        renderAll();
      } else btn.disabled = false;
    });
  });

  // Remove assignment
  document.querySelectorAll('[data-remove-assignment]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.removeAssignment;
      if (!confirm('Remove this assignment?')) return;
      const res = await apiCall('removeAssignment', { id });
      if (res.ok) { state.assignments = state.assignments.filter(x => x.id !== id); renderAll(); }
    });
  });
}

// ── Manage tab ────────────────────────────────────────────────────────
function renderManage() {
  let html = `<div class="section-header"><h2>Businesses</h2></div>
    <p class="hint" style="margin-top:-8px; margin-bottom:14px;">The "Landing Page Code" is also used as the staff PIN to confirm driver and customer redemptions on the business page. Driver perk and tourist offer are different — fill both.</p>
    <div class="card">`;
  state.businesses.forEach(b => {
    html += `<div class="assign-row" style="gap:8px; flex-wrap:wrap;">
      <div style="display:flex; gap:8px; flex:1; min-width:0; flex-wrap:wrap;">
        <input data-biz-name="${b.id}" value="${escapeHtml(b.name)}" placeholder="Business name" style="flex:1.4; min-width:140px;">
        <input data-biz-code="${b.id}" value="${escapeHtml(b.code)}" placeholder="Landing Page Code (PIN)" class="mono" style="width:160px">
        <input data-biz-perk="${b.id}" value="${escapeHtml(b.perk)}" placeholder="Driver perk (weekly)" style="flex:1.6; min-width:160px;">
        <input data-biz-offer="${b.id}" value="${escapeHtml(b.touristOffer || '')}" placeholder="Tourist offer (customer redeem page)" style="flex:1.6; min-width:160px;">
      </div>
      <button class="btn btn-sm btn-icon btn-ghost btn-danger" data-remove-biz="${b.id}">✕</button>
    </div>`;
  });
  html += `<div style="margin-top:12px; display:flex; gap:8px;">
    <button class="btn btn-sm" data-add-biz>+ Add business</button>
    <button class="btn btn-sm btn-primary" data-save-biz>Save changes</button>
  </div><p class="hint" id="bizMsg"></p></div>`;

  html += `<div class="section-header"><h2>Drivers</h2></div><div class="card">`;
  state.drivers.forEach(d => {
    html += `<div class="assign-row" style="gap:8px; align-items:center;">
      <span class="code-badge" style="flex-shrink:0; min-width:52px; text-align:center;">${escapeHtml(d.id)}</span>
      <input data-drv-name="${d.id}" value="${escapeHtml(d.name)}" placeholder="Driver name" style="flex:1;">
      <button class="btn btn-sm btn-icon btn-ghost btn-danger" data-remove-drv="${d.id}">✕</button>
    </div>`;
  });
  html += `<div style="margin-top:12px; display:flex; gap:8px;">
    <button class="btn btn-sm" data-add-drv>+ Add driver</button>
    <button class="btn btn-sm btn-primary" data-save-drv>Save changes</button>
  </div><p class="hint" id="drvMsg"></p></div>`;

  document.getElementById('content-manage').innerHTML = html;
  attachManageHandlers();
}

function attachManageHandlers() {
  document.querySelector('[data-add-biz]')?.addEventListener('click', async () => {
    const res = await apiCall('addBusiness', { name: 'New business', code: '0000', perk: 'Perk description' });
    if (res.ok) { state.businesses.push({ id: res.id, name: 'New business', code: '0000', perk: 'Perk description', active: true }); renderManage(); }
  });

  document.querySelector('[data-add-drv]')?.addEventListener('click', async () => {
    const res = await apiCall('addDriver', { name: 'New driver' });
    if (res.ok) { state.drivers.push({ id: res.id, name: 'New driver', active: true }); renderManage(); }
  });

  document.querySelectorAll('[data-remove-biz]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.removeBiz;
      if (!confirm('Remove this business and all its assignments?')) return;
      const res = await apiCall('removeBusiness', { id });
      if (res.ok) { state.businesses = state.businesses.filter(b => b.id !== id); state.assignments = state.assignments.filter(a => a.businessId !== id); renderAll(); }
    });
  });

  document.querySelectorAll('[data-remove-drv]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.removeDrv;
      if (!confirm('Remove this driver and all their assignments?')) return;
      const res = await apiCall('removeDriver', { id });
      if (res.ok) { state.drivers = state.drivers.filter(d => d.id !== id); state.assignments = state.assignments.filter(a => a.driverId !== id); renderAll(); }
    });
  });

  document.querySelector('[data-save-biz]')?.addEventListener('click', async () => {
    const msg = document.getElementById('bizMsg');
    msg.textContent = 'Saving...'; msg.className = 'hint';
    let ok = true;
    for (const b of state.businesses) {
      const name = document.querySelector(`[data-biz-name="${b.id}"]`)?.value;
      const code = document.querySelector(`[data-biz-code="${b.id}"]`)?.value;
      const perk = document.querySelector(`[data-biz-perk="${b.id}"]`)?.value;
      const touristOffer = document.querySelector(`[data-biz-offer="${b.id}"]`)?.value;
      const res = await apiCall('updateBusiness', { id: b.id, name, code, perk, touristOffer });
      if (res.ok) { b.name = name; b.code = code; b.perk = perk; b.touristOffer = touristOffer; } else ok = false;
    }
    msg.textContent = ok ? 'Saved.' : 'Some changes failed.';
    msg.className = ok ? 'hint success' : 'hint error';
  });

  document.querySelector('[data-save-drv]')?.addEventListener('click', async () => {
    const msg = document.getElementById('drvMsg');
    msg.textContent = 'Saving...'; msg.className = 'hint';
    let ok = true;
    for (const d of state.drivers) {
      const name = document.querySelector(`[data-drv-name="${d.id}"]`)?.value;
      const res = await apiCall('updateDriver', { id: d.id, name });
      if (res.ok) d.name = name; else ok = false;
    }
    msg.textContent = ok ? 'Saved.' : 'Some changes failed.';
    msg.className = ok ? 'hint success' : 'hint error';
    renderAll();
  });
}

// ── Links tab ─────────────────────────────────────────────────────────
function renderLinks() {
  const base = location.origin + location.pathname.replace(/admin\.html$/, '');
  let html = `<div class="section-header"><h2>Driver pages</h2></div><div class="card">
    <p class="hint" style="margin-bottom:14px;">Send each driver their link once — it always shows their current perks and status.</p>`;
  state.drivers.forEach(d => {
    const url = `${base}driver.html?id=${d.id}`;
    html += `<div class="assign-row" style="gap:8px;">
      <span class="code-badge" style="flex-shrink:0;">${escapeHtml(d.id)}</span>
      <span style="min-width:80px; flex-shrink:0;">${escapeHtml(d.name)}</span>
      <span class="code-badge" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(url)}</span>
      <button class="btn btn-sm" data-copy="${escapeHtml(url)}">Copy</button>
    </div>`;
  });
  html += `</div><div class="section-header"><h2>Business pages (staff)</h2></div><div class="card">
    <p class="hint" style="margin-bottom:14px;">Send each business their link once — staff use it to confirm driver redemptions and redeem customer codes.</p>`;
  state.businesses.forEach(b => {
    const url = `${base}business.html?id=${b.id}`;
    html += `<div class="assign-row" style="gap:8px;">
      <span style="min-width:130px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(b.name)}</span>
      <span class="code-badge" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(url)}</span>
      <button class="btn btn-sm" data-copy="${escapeHtml(url)}">Copy</button>
    </div>`;
  });

  html += `</div><div class="section-header"><h2>Customer offer pages (QR for tablets/ads)</h2></div><div class="card">
    <p class="hint" style="margin-bottom:14px;">One QR per restaurant. Customers scan this to view the tourist offer and get a one-time code.</p>`;
  state.businesses.forEach(b => {
    const url = `${base}redeem.html?biz=${b.id}`;
    const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(url)}`;
    html += `<div class="assign-row" style="gap:8px; align-items:center;">
      <span style="min-width:130px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(b.name)}</span>
      <span class="code-badge" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(url)}</span>
      <button class="btn btn-sm" data-copy="${escapeHtml(url)}">Copy</button>
      <button class="btn btn-sm" data-qr="${escapeHtml(qrSrc)}" data-qr-name="${escapeHtml(b.name)}">QR</button>
    </div>`;
  });
  html += `</div><div id="qrModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:14px;">
    <img id="qrImg" style="background:#fff; padding:12px; border-radius:12px; width:240px; height:240px;">
    <p class="hint" id="qrName" style="color:#fff;"></p>
    <button class="btn" id="qrCloseBtn">Close</button>
  </div>`;
  document.getElementById('content-links').innerHTML = html;

  document.querySelectorAll('[data-qr]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('qrImg').src = btn.dataset.qr;
      document.getElementById('qrName').textContent = btn.dataset.qrName;
      document.getElementById('qrModal').style.display = 'flex';
    });
  });
  document.getElementById('qrCloseBtn').addEventListener('click', () => {
    document.getElementById('qrModal').style.display = 'none';
  });
  document.getElementById('qrModal').addEventListener('click', (e) => {
    if (e.target.id === 'qrModal') document.getElementById('qrModal').style.display = 'none';
  });

  document.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.dataset.copy).catch(() => {});
      const orig = btn.textContent; btn.textContent = 'Copied';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    });
  });
}

// ── Customer Redeems tab ─────────────────────────────────────────────────
let redeemsWeek = CURRENT_WEEK;

function renderRedeems() {
  const weeks = Array.from(new Set(state.redemptions.map(r => r.week))).sort().reverse();
  if (!weeks.includes(CURRENT_WEEK)) weeks.unshift(CURRENT_WEEK);
  if (!weeks.includes(redeemsWeek)) redeemsWeek = CURRENT_WEEK;

  const weekData = state.redemptions.filter(r => r.week === redeemsWeek);
  const generated = weekData.length;
  const redeemed = weekData.filter(r => r.status === 'redeemed').length;
  const expired = weekData.filter(r => r.status === 'expired').length;
  const active = weekData.filter(r => r.status === 'active').length;

  // Per business summary
  const byBiz = {};
  weekData.forEach(r => {
    if (!byBiz[r.businessName]) byBiz[r.businessName] = { generated: 0, redeemed: 0 };
    byBiz[r.businessName].generated++;
    if (r.status === 'redeemed') byBiz[r.businessName].redeemed++;
  });

  let html = `
    <div class="month-nav">
      <button class="btn btn-sm btn-ghost" id="redeemsPrevBtn">‹ Prev</button>
      <h2>${escapeHtml(redeemsWeek)}</h2>
      <button class="btn btn-sm btn-ghost" id="redeemsNextBtn">Next ›</button>
      <button class="btn btn-sm btn-primary" id="exportCsvBtn">Export CSV</button>
    </div>

    <div class="grid" style="margin-bottom:24px;">
      <div class="stat-card"><div class="stat-label">Codes generated</div><div class="stat-value">${generated}</div></div>
      <div class="stat-card"><div class="stat-label">Redeemed</div><div class="stat-value teal">${redeemed}</div></div>
      <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value amber">${active}</div></div>
      <div class="stat-card"><div class="stat-label">Expired</div><div class="stat-value">${expired}</div></div>
    </div>

    <div class="section-header"><h2>By restaurant — ${escapeHtml(redeemsWeek)}</h2></div>
    <div class="card" style="margin-bottom:24px;">`;

  if (!Object.keys(byBiz).length) {
    html += `<p class="hint" style="margin:0;">No codes generated this week.</p>`;
  } else {
    html += `<table class="assign-table"><thead><tr><th>Restaurant</th><th>Generated</th><th>Redeemed</th><th>Conversion</th></tr></thead><tbody>`;
    Object.entries(byBiz).forEach(([name, v]) => {
      const conv = v.generated ? Math.round((v.redeemed / v.generated) * 100) : 0;
      html += `<tr><td>${escapeHtml(name)}</td><td>${v.generated}</td><td>${v.redeemed}</td><td>${conv}%</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  html += `<div class="section-header"><h2>All codes — ${escapeHtml(redeemsWeek)}</h2></div><div class="card">`;
  if (!weekData.length) {
    html += `<p class="hint" style="margin:0;">No codes yet.</p>`;
  } else {
    html += `<table class="assign-table"><thead><tr><th>Code</th><th>Restaurant</th><th>Created</th><th>Status</th><th>Redeemed at</th><th></th></tr></thead><tbody>`;
    weekData
      .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
      .forEach(r => {
        const pillClass = r.status === 'redeemed' ? 'pill-redeemed' : (r.status === 'expired' ? 'pill-expired' : 'pill-available');
        html += `<tr>
          <td class="mono">${escapeHtml(r.code)}</td>
          <td>${escapeHtml(r.businessName)}</td>
          <td style="font-size:0.8rem; color:var(--text-soft);">${new Date(r.createdAt).toLocaleString()}</td>
          <td><span class="pill ${pillClass}" style="font-size:0.65rem;">${escapeHtml(r.status)}</span></td>
          <td style="font-size:0.8rem; color:var(--text-soft);">${r.redeemedAt ? new Date(r.redeemedAt).toLocaleString() : '—'}</td>
          <td style="white-space:nowrap; text-align:right;">
            ${r.status === 'redeemed' ? `<button class="btn btn-sm btn-ghost" data-undo-redeem-code="${escapeHtml(r.code)}">Undo</button>` : ''}
            <button class="btn btn-sm btn-icon btn-ghost btn-danger" data-delete-redeem-code="${escapeHtml(r.code)}">✕</button>
          </td>
        </tr>`;
      });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  document.getElementById('content-redeems').innerHTML = html;

  document.getElementById('redeemsPrevBtn').addEventListener('click', () => {
    const idx = weeks.indexOf(redeemsWeek);
    if (idx < weeks.length - 1) redeemsWeek = weeks[idx + 1];
    renderRedeems();
  });
  document.getElementById('redeemsNextBtn').addEventListener('click', () => {
    const idx = weeks.indexOf(redeemsWeek);
    if (idx > 0) redeemsWeek = weeks[idx - 1];
    renderRedeems();
  });
  document.getElementById('exportCsvBtn').addEventListener('click', () => exportRedeemsCsv(weekData, redeemsWeek));

  document.querySelectorAll('[data-undo-redeem-code]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const code = btn.dataset.undoRedeemCode;
      btn.disabled = true;
      const res = await apiCall('unredeemCustomerCode', { code });
      if (res.ok) {
        const redRes = await apiCall('getCustomerRedemptions', {});
        if (redRes.ok) state.redemptions = redRes.redemptions || [];
        renderRedeems();
      } else {
        alert(res.error || 'Could not undo.');
        btn.disabled = false;
      }
    });
  });

  document.querySelectorAll('[data-delete-redeem-code]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const code = btn.dataset.deleteRedeemCode;
      if (!confirm(`Delete code ${code}? This cannot be undone.`)) return;
      btn.disabled = true;
      const res = await apiCall('deleteCustomerCode', { code });
      if (res.ok) {
        state.redemptions = state.redemptions.filter(r => r.code !== code);
        renderRedeems();
      } else {
        alert(res.error || 'Could not delete.');
        btn.disabled = false;
      }
    });
  });
}

function exportRedeemsCsv(rows, weekKey) {
  const headers = ['code', 'businessName', 'createdAt', 'expiresAt', 'status', 'redeemedAt'];
  let csv = headers.join(',') + '\n';
  rows.forEach(r => {
    csv += headers.map(h => `"${String(r[h] ?? '').replace(/"/g, '""')}"`).join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `waveads-redeems-${weekKey}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Tab switching ─────────────────────────────────────────────────────
document.querySelectorAll('.view-tabs button').forEach(b => {
  b.addEventListener('click', () => {
    activeTab = b.dataset.tab;
    document.querySelectorAll('.view-tabs button').forEach(x => x.classList.toggle('active', x === b));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.toggle('active', x.id === 'content-' + activeTab));
    renderAll();
  });
});

load();
</script>
