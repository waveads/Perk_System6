<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveAds — Special Offer</title>
<link rel="stylesheet" href="styles.css">
<style>
  .redeem-shell {
    max-width: 480px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    text-align: center;
  }
  .offer-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 22px;
    margin: 24px 0;
  }
  .offer-text {
    font-size: 1.15rem;
    line-height: 1.5;
    color: var(--text);
    margin: 0;
  }
  .code-display {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 2.4rem;
    letter-spacing: 0.08em;
    color: var(--teal-bright);
    background: var(--surface-2);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius);
    padding: 22px 10px;
    margin: 18px 0;
  }
  .timer {
    font-size: 0.85rem;
    color: var(--text-soft);
    margin-top: 8px;
  }
  .timer.warn { color: var(--amber); }
  .timer.expired { color: var(--red); }
</style>
</head>
<body>

<div class="redeem-shell">
  <div class="logo" id="logoSlot" style="width:48px; height:48px; margin:0 auto 12px;"></div>
  <h1 id="bizName">—</h1>
  <p class="subtitle" id="subtitle">Loading offer...</p>

  <div id="content"></div>
</div>

<script src="config.js"></script>
<script>
document.getElementById('logoSlot').innerHTML = LOGO_SVG;

const params = new URLSearchParams(location.search);
const businessId = params.get('biz');

let countdownTimer = null;

// Persistent anonymous device ID (used server-side to prevent repeated code generation)
function getDeviceId() {
  let id = localStorage.getItem('waveads_device_id');
  if (!id) {
    id = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('waveads_device_id', id);
  }
  return id;
}
const deviceId = getDeviceId();

async function init() {
  if (!businessId) {
    document.getElementById('bizName').textContent = 'Missing link';
    document.getElementById('subtitle').textContent = 'This QR code is missing information. Please ask staff for help.';
    return;
  }

  const res = await apiCall('getBusinessView', { businessId });
  if (!res.ok) {
    document.getElementById('bizName').textContent = 'Not available';
    document.getElementById('subtitle').textContent = res.error || 'Could not load this offer.';
    return;
  }

  const business = res.business;
  document.getElementById('bizName').textContent = business.name;
  document.getElementById('subtitle').textContent = 'Limited-time exclusive offer';

  const offer = business.touristOffer || business.perk || 'Ask staff about today\'s special offer.';

  document.getElementById('content').innerHTML = `
    <div class="offer-card">
      <p class="offer-text">${escapeHtml(offer)}</p>
    </div>
    <button class="btn btn-primary" id="getCodeBtn" style="width:100%; padding:16px; font-size:1rem;">Get my code</button>
    <p class="hint" style="margin-top:14px;">Tap the button, then show the code on this screen to staff.</p>
  `;

  document.getElementById('getCodeBtn').addEventListener('click', getCode);
}

async function getPublicIp() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    return d.ip || '';
  } catch(_) { return ''; }
}

async function getCode() {
  const btn = document.getElementById('getCodeBtn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  const clientIp = await getPublicIp();
  const res = await apiCall('generateCustomerCode', { businessId, deviceId, clientIp }, { clientIp });
  if (!res.ok) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state"><h3>Could not generate code</h3><p>${escapeHtml(res.error || 'Please try again.')}</p></div>
      <button class="btn btn-primary" id="retryBtn" style="width:100%; margin-top:14px;">Try again</button>`;
    document.getElementById('retryBtn').addEventListener('click', init);
    return;
  }

  const offer = res.touristOffer || '';
  document.getElementById('content').innerHTML = `
    ${offer ? `<div class="offer-card"><p class="offer-text">${escapeHtml(offer)}</p></div>` : ''}
    <div class="code-display" id="codeDisplay">${escapeHtml(res.code)}</div>
    <p class="hint" id="timerHint" class="timer">Show this code to staff now.</p>
    ${res.reused ? `<p class="hint" style="margin-top:10px;">You already have a code — here it is again.</p>` : ''}
    <p class="hint" style="margin-top:18px;">This code can only be used once.</p>
  `;

  startCountdown(new Date(res.expiresAt));
}

function startCountdown(expiresAt) {
  if (countdownTimer) clearInterval(countdownTimer);
  const tick = () => {
    const diff = expiresAt - new Date();
    const hint = document.getElementById('timerHint');
    if (!hint) { clearInterval(countdownTimer); return; }
    if (diff <= 0) {
      hint.textContent = 'This code has expired.';
      hint.className = 'hint timer expired';
      clearInterval(countdownTimer);
      return;
    }
    const mins = Math.floor(diff / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    hint.textContent = `Valid for ${mins}m ${secs}s — show this to staff now.`;
    hint.className = diff < 5 * 60000 ? 'hint timer warn' : 'hint timer';
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

init();
</script>
</body>
</html>
